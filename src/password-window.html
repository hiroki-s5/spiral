<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e1e; --panel: #252525; --border: rgba(255,255,255,0.08);
  --text: #e8e8e8; --text2: #888; --text3: #444;
  --accent: #3478f6; --card: #2c2c2c; --hover: rgba(255,255,255,0.06);
  --green: #30d158; --red: rgba(255,59,48,0.75);
}
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased; user-select: none; overflow: hidden; }
#root { height: 100%; display: flex; flex-direction: column; }

#header { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; -webkit-app-region: drag; gap: 8px; }
#drag-area { flex: 1; display: flex; align-items: center; gap: 8px; pointer-events: none; }
#drag-area h1 { font-size: 13px; font-weight: 700; }
#close-btn { -webkit-app-region: no-drag; width: 22px; height: 22px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
#close-btn:hover { background: var(--red); color: #fff; }

#tabbar { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; -webkit-app-region: no-drag; }
.tabbar-btn { flex: 1; padding: 9px 4px; border: none; background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
.tabbar-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tabbar-btn:hover:not(.active) { color: var(--text); }

#toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; -webkit-app-region: no-drag; }
#search { flex: 1; padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 12px; outline: none; font-family: inherit; user-select: text; }
#search::placeholder { color: var(--text3); }
#search:focus { border-color: var(--accent); }
#add-btn { padding: 6px 13px; border-radius: 7px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: opacity 0.15s; }
#add-btn:hover { opacity: 0.85; }
#copy-all-btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.12s; }
#copy-all-btn:hover { color: var(--text); }

#count-bar { padding: 4px 14px; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }

#list-wrap { flex: 1; overflow-y: auto; padding: 6px 8px; }
#list-wrap::-webkit-scrollbar { width: 4px; }
#list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

/* パスワードアイテム */
.pw-item { display: grid; grid-template-columns: 1fr auto; gap: 2px 8px; padding: 9px 10px; border-radius: 9px; margin-bottom: 3px; transition: background 0.1s; }
.pw-item:hover { background: var(--hover); }
.pw-item .domain { font-size: 12px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pw-item .username { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pw-item .actions { grid-column: 2; grid-row: 1 / 3; display: flex; align-items: center; gap: 4px; }
.pw-reveal { display: none; grid-column: 1 / 3; margin-top: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-family: 'Menlo','Monaco',monospace; font-size: 10px; color: var(--text2); word-break: break-all; user-select: text; }
.pw-reveal.show { display: block; }

/* ログインアイテム */
.lh-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 9px; margin-bottom: 3px; transition: background 0.1s; }
.lh-item:hover { background: var(--hover); }
.lh-favicon-wrap { width: 28px; height: 28px; flex-shrink: 0; }
.lh-favicon { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; background: var(--card); display: block; }
.lh-favicon-letter { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.lh-url { font-size: 10px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.lh-body { flex: 1; min-width: 0; }
.lh-title { font-size: 12px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lh-email { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
.lh-date { font-size: 10px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
.lh-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.lh-login-btn { padding: 5px 10px; border-radius: 7px; border: none; background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.lh-login-btn:hover { opacity: 0.85; }
.lh-login-btn.loading { opacity: 0.5; cursor: default; }

.copy-btn, .toggle-btn, .edit-btn, .del-btn { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.12s; font-family: inherit; line-height: 1.4; }
.copy-btn:hover, .toggle-btn:hover, .edit-btn:hover { background: var(--hover); color: var(--text); }
.del-btn:hover { background: var(--red); color: #fff; border-color: transparent; }
.copy-btn.copied { background: rgba(48,209,88,0.15); color: var(--green); border-color: rgba(48,209,88,0.3); }

.empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text2); font-size: 12px; text-align: center; line-height: 1.7; }
.empty-state svg { opacity: 0.2; margin-bottom: 4px; }

/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px; width: 300px; display: flex; flex-direction: column; gap: 14px; }
.modal h2 { font-size: 13px; font-weight: 700; }
.modal-field { display: flex; flex-direction: column; gap: 5px; }
.modal-field label { font-size: 11px; color: var(--text2); }
.modal-field input { padding: 8px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 12px; outline: none; font-family: inherit; user-select: text; }
.modal-field input:focus { border-color: var(--accent); }
.modal-field input::placeholder { color: var(--text3); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 7px 18px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { background: rgba(255,255,255,0.08); color: var(--text2); }
.btn-save   { background: var(--accent); color: #fff; }
.btn-cancel:hover { background: rgba(255,255,255,0.14); }
.btn-save:hover   { opacity: 0.85; }

#toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--green); color: #fff; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 200; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { background: #ff3b30; }
</style>
</head>
<body>
<div id="root">
  <div id="header">
    <div id="drag-area"><h1>パスワード管理</h1></div>
    <button id="close-btn">✕</button>
  </div>
  <div id="tabbar">
    <button class="tabbar-btn active" data-tab="passwords">パスワード</button>
    <button class="tabbar-btn" data-tab="logins">ログイン情報</button>
  </div>
  <div id="toolbar">
    <input id="search" type="text" placeholder="検索..." autocomplete="off" spellcheck="false">
    <button id="add-btn">＋ 追加</button>
    <button id="copy-all-btn">一括コピー</button>
  </div>
  <div id="count-bar">読み込み中...</div>
  <div id="list-wrap">
    <div id="list"></div>
    <div class="empty-state" id="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span id="empty-msg">データがありません</span>
    </div>
  </div>
</div>

<!-- パスワード追加・編集モーダル（サービス名 + パスワードのみ） -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h2 id="pw-modal-title">パスワードを追加</h2>
    <div class="modal-field">
      <label>サービス名 / URL</label>
      <input id="pw-service" type="text" placeholder="例: Google、https://google.com">
    </div>
    <div class="modal-field">
      <label>パスワード</label>
      <input id="pw-pass" type="text" placeholder="パスワードを入力">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="pw-cancel">キャンセル</button>
      <button class="btn-save"   id="pw-save">保存</button>
    </div>
  </div>
</div>

<!-- ログイン情報追加・編集モーダル -->
<div class="modal-overlay" id="lh-modal">
  <div class="modal">
    <h2 id="lh-modal-title">ログイン情報を追加</h2>
    <div class="modal-field">
      <label>サイトURL</label>
      <input id="lh-url" type="text" placeholder="https://example.com">
    </div>
    <div class="modal-field">
      <label>メール / ユーザー名</label>
      <input id="lh-email" type="text" placeholder="user@example.com">
    </div>
    <div class="modal-field">
      <label>パスワード</label>
      <input id="lh-pw" type="text" placeholder="パスワードを入力">
    </div>
    <input type="hidden" id="lh-title-hidden">
    <div class="modal-btns">
      <button class="btn-cancel" id="lh-cancel">キャンセル</button>
      <button class="btn-save"   id="lh-save">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
let allPasswords = [], allLogins = [], filteredPw = [], filteredLh = [];
let currentTab = 'passwords';
let editingPwId = null, editingLhId = null;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hostnameOf(url) {
  try { return new URL(url).hostname.replace(/^www\./,''); } catch { return url||''; }
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('ja-JP', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._t); t._t = setTimeout(() => { t.className = ''; }, 2200);
}

// ── パスワードタブ ──
function renderPasswords(list) {
  const el = document.getElementById('list');
  document.getElementById('count-bar').textContent = list.length + ' 件';
  document.getElementById('empty').style.display = list.length ? 'none' : 'flex';
  document.getElementById('empty-msg').textContent = 'パスワードがありません\n「＋ 追加」から登録できます';
  if (!list.length) { el.innerHTML = ''; return; }
  el.innerHTML = list.map((p, i) => {
    // サービス名: nameフィールド優先、なければURLのhostname
    const svc  = p.name || hostnameOf(p.url) || p.url || '不明';
    const user = p.username || p.email || p.user || '';
    return `<div class="pw-item">
      <div class="domain" title="${esc(svc)}">${esc(svc)}</div>
      <div class="username">${user ? esc(user) : '<span style="color:var(--text3)">ユーザー名なし</span>'}</div>
      <div class="actions">
        <button class="toggle-btn" onclick="toggleReveal(this,${i})">表示</button>
        <button class="copy-btn"   onclick="copyPw(this,${i})">コピー</button>
        <button class="edit-btn"   onclick="openEditPw(${i})">編集</button>
        <button class="del-btn"    onclick="deletePw(${i})">削除</button>
      </div>
      <div class="pw-reveal" id="reveal-${i}"></div>
    </div>`;
  }).join('');
}
function toggleReveal(btn, idx) {
  const el = document.getElementById('reveal-' + idx);
  const pw = filteredPw[idx]?.password || filteredPw[idx]?.pass || '';
  if (el.classList.contains('show')) { el.classList.remove('show'); btn.textContent = '表示'; }
  else { el.textContent = pw || '（なし）'; el.classList.add('show'); btn.textContent = '隠す'; }
}
function copyPw(btn, idx) {
  const pw = filteredPw[idx]?.password || filteredPw[idx]?.pass || '';
  navigator.clipboard.writeText(pw).then(() => {
    btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
    showToast('コピーしました');
  });
}
function openEditPw(idx) {
  const p = filteredPw[idx]; if (!p) return;
  editingPwId = p.id || null;
  document.getElementById('pw-modal-title').textContent = 'パスワードを編集';
  document.getElementById('pw-service').value = p.name || hostnameOf(p.url) || p.url || '';
  document.getElementById('pw-pass').value    = p.password || p.pass || '';
  document.getElementById('pw-modal').classList.add('show');
}
async function deletePw(idx) {
  const p = filteredPw[idx]; if (!p) return;
  if (!p.id) { showToast('削除できません', true); return; }
  await window.pwManager.deletePassword(p.id);
  allPasswords = allPasswords.filter(x => x.id !== p.id);
  applyFilter(); showToast('削除しました');
}

// ── ログイン情報タブ ──
function getFaviconUrl(e) {
  const dom = e.hostname || hostnameOf(e.url) || '';
  if (!dom) return '';
  // Google favicon API は最も信頼性が高い
  return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(dom) + '&sz=32';
}
function faviconImgHtml(e, i) {
  const src = getFaviconUrl(e);
  const dom = e.hostname || hostnameOf(e.url) || '';
  const letter = (e.title || dom || '?')[0].toUpperCase();
  // onerror でフォールバック: 文字アバターを表示
  return `<div class="lh-favicon-wrap" id="fav-wrap-${i}">
    <img class="lh-favicon" src="${esc(src)}"
      onerror="document.getElementById('fav-wrap-${i}').innerHTML='<div class=lh-favicon-letter>${esc(letter)}</div>'"
      alt="">
  </div>`;
}
function renderLogins(list) {
  const el = document.getElementById('list');
  document.getElementById('count-bar').textContent = list.length + ' 件';
  document.getElementById('empty').style.display = list.length ? 'none' : 'flex';
  document.getElementById('empty-msg').textContent = 'ログイン情報がありません\n「＋ 追加」から登録できます';
  if (!list.length) { el.innerHTML = ''; return; }
  el.innerHTML = list.map((e, i) => {
    const dom   = e.hostname || hostnameOf(e.url) || e.title || '不明';
    const email = e.email || '';
    const date  = fmtDate(e.loginAt || e.createdAt);
    const urlDisplay = e.url ? `<div class="lh-url">${esc(e.url)}</div>` : '';
    return `<div class="lh-item">
      ${faviconImgHtml(e, i)}
      <div class="lh-body">
        <div class="lh-title">${esc(e.title || dom)}</div>
        <div class="lh-email">${email ? esc(email) : '<span style="color:var(--text3)">メール未登録</span>'}</div>
        ${urlDisplay}
      </div>
      <div class="lh-date">${esc(date)}</div>
      <div class="lh-actions">
        <button class="lh-login-btn" onclick="doAutoLogin(this,${i})">ログイン</button>
        <button class="edit-btn"     onclick="openEditLh(${i})">編集</button>
        <button class="del-btn"      onclick="deleteLh(${i})">削除</button>
      </div>
    </div>`;
  }).join('');
}
async function doAutoLogin(btn, idx) {
  const entry = filteredLh[idx]; if (!entry) return;
  btn.textContent = '遷移中…'; btn.classList.add('loading');
  try {
    const tabId = await window.pwManager.getActiveTabId();
    if (!tabId) showToast('アクティブなタブが見つかりません', true);
    else {
      const res = await window.pwManager.autoLogin(tabId, entry);
      if (res?.error) showToast('エラー: ' + res.error, true);
      else { showToast((entry.hostname||'') + ' へ遷移しました'); setTimeout(() => window.close(), 800); }
    }
  } catch(e) { showToast('エラー: ' + e.message, true); }
  btn.textContent = 'ログイン'; btn.classList.remove('loading');
}
function openEditLh(idx) {
  const e = filteredLh[idx]; if (!e) return;
  editingLhId = e.id || null;
  document.getElementById('lh-modal-title').textContent = 'ログイン情報を編集';
  document.getElementById('lh-url').value           = e.url || '';
  document.getElementById('lh-email').value         = e.email || '';
  document.getElementById('lh-pw').value            = e.password || e.pass || '';
  document.getElementById('lh-title-hidden').value  = e.title || e.hostname || '';
  document.getElementById('lh-modal').classList.add('show');
}
async function deleteLh(idx) {
  const e = filteredLh[idx]; if (!e) return;
  if (!e.id) { showToast('削除できません', true); return; }
  await window.pwManager.deleteLogin(e.id);
  allLogins = allLogins.filter(x => x.id !== e.id);
  applyFilter(); showToast('削除しました');
}

// ── モーダル ──
document.getElementById('add-btn').addEventListener('click', () => {
  if (currentTab === 'passwords') {
    editingPwId = null;
    document.getElementById('pw-modal-title').textContent = 'パスワードを追加';
    document.getElementById('pw-service').value = '';
    document.getElementById('pw-pass').value    = '';
    document.getElementById('pw-modal').classList.add('show');
    setTimeout(() => document.getElementById('pw-service').focus(), 50);
  } else {
    editingLhId = null;
    document.getElementById('lh-modal-title').textContent = 'ログイン情報を追加';
    document.getElementById('lh-url').value           = '';
    document.getElementById('lh-email').value         = '';
    document.getElementById('lh-pw').value            = '';
    document.getElementById('lh-title-hidden').value  = '';
    document.getElementById('lh-modal').classList.add('show');
    setTimeout(() => document.getElementById('lh-url').focus(), 50);
  }
});

document.getElementById('pw-save').addEventListener('click', async () => {
  const svc  = document.getElementById('pw-service').value.trim();
  const pass = document.getElementById('pw-pass').value;
  if (!svc) { showToast('サービス名またはURLを入力してください', true); return; }
  // URLかサービス名かを判定
  let url = '', name = svc;
  if (svc.startsWith('http://') || svc.startsWith('https://') || svc.includes('.')) {
    let u = svc;
    if (!u.startsWith('http')) u = 'https://' + u;
    try { url = u; name = new URL(u).hostname.replace(/^www\./, ''); } catch { url = ''; }
  }
  const entry = { name, url, password: pass };
  if (editingPwId) entry.id = editingPwId;
  await window.pwManager.savePassword(entry);
  document.getElementById('pw-modal').classList.remove('show');
  await reload(); showToast(editingPwId ? '更新しました' : '追加しました');
});
document.getElementById('pw-cancel').addEventListener('click', () => {
  document.getElementById('pw-modal').classList.remove('show');
});

document.getElementById('lh-save').addEventListener('click', async () => {
  const rawUrl = document.getElementById('lh-url').value.trim();
  const email  = document.getElementById('lh-email').value.trim();
  const pw     = document.getElementById('lh-pw').value;
  const titleH = document.getElementById('lh-title-hidden').value;
  if (!email) { showToast('メール/ユーザー名を入力してください', true); return; }
  // URL正規化: httpがなければ付与
  let url = rawUrl;
  if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }
  // URL検証
  let hostname = '';
  if (url) {
    try {
      hostname = new URL(url).hostname.replace(/^www\./, '');
    } catch {
      showToast('URLの形式が正しくありません', true); return;
    }
  }
  const title = titleH || hostname || email;
  const entry = { email, password: pw, url, title, hostname };
  if (editingLhId) entry.id = editingLhId;
  await window.pwManager.saveLogin(entry);
  document.getElementById('lh-modal').classList.remove('show');
  await reload(); showToast(editingLhId ? '更新しました' : '追加しました');
});
document.getElementById('lh-cancel').addEventListener('click', () => {
  document.getElementById('lh-modal').classList.remove('show');
});

['pw-modal','lh-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
});

// ── 共通 ──
function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (currentTab === 'passwords') {
    filteredPw = q ? allPasswords.filter(p =>
      (p.name||p.url||'').toLowerCase().includes(q) ||
      (p.username||p.email||p.user||'').toLowerCase().includes(q)
    ) : [...allPasswords];
    renderPasswords(filteredPw);
  } else {
    filteredLh = q ? allLogins.filter(e =>
      (e.hostname||e.url||e.title||'').toLowerCase().includes(q) ||
      (e.email||'').toLowerCase().includes(q)
    ) : [...allLogins];
    renderLogins(filteredLh);
  }
}
async function reload() {
  const res = await window.pwManager.getAll();
  allPasswords = res.passwords || [];
  allLogins = (res.loginHistory || []).sort((a,b) => (b.loginAt||b.createdAt||0)-(a.loginAt||a.createdAt||0));
  filteredPw = [...allPasswords]; filteredLh = [...allLogins];
  applyFilter();
}

document.querySelectorAll('.tabbar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabbar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('search').value = '';
    document.getElementById('copy-all-btn').style.display = currentTab === 'passwords' ? '' : 'none';
    applyFilter();
  });
});

document.getElementById('copy-all-btn').addEventListener('click', () => {
  if (!filteredPw.length) return;
  const text = filteredPw.map(p => {
    const svc  = p.name || hostnameOf(p.url) || p.url || '';
    const user = p.username || p.email || p.user || '';
    return '[' + svc + ']' + (user ? '\nユーザー名: ' + user : '') + '\nパスワード: ' + (p.password || p.pass || '');
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast(filteredPw.length + '件を一括コピーしました'));
});

document.getElementById('search').addEventListener('input', applyFilter);
document.getElementById('close-btn').addEventListener('click', () => window.close());
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const pw = document.getElementById('pw-modal');
    const lh = document.getElementById('lh-modal');
    if (pw.classList.contains('show')) { pw.classList.remove('show'); return; }
    if (lh.classList.contains('show')) { lh.classList.remove('show'); return; }
    window.close();
  }
});

reload();
</script>
</body>
</html>
