<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<title>Spiral</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sb-w: 300px;
  --peek: 10px;
  --panel: rgba(242,243,250,0.97);
  --panel-border: rgba(255,255,255,0.8);
  --card: rgba(255,255,255,0.92);
  --card-border: rgba(200,202,216,0.55);
  --hover: rgba(0,0,0,0.05);
  --active: rgba(0,0,0,0.08);
  --text: #1c1c1e;
  --text2: #636366;
  --textm: #b0b0b8;
  --accent: #3478f6;
  --accent-s: rgba(52,120,246,0.12);
  --sep: rgba(0,0,0,0.07);
  --shadow: 0 12px 48px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
  --shadow-peek: 3px 0 12px rgba(0,0,0,0.15), 2px 0 4px rgba(0,0,0,0.08);
  --pin-bg: rgba(255,255,255,0.85);
  --spin: #3478f6;
  --tidy: #8e8e93;
}
[data-theme="dark"] {
  --panel: rgba(24,24,36,0.98);
  --panel-border: rgba(255,255,255,0.07);
  --card: rgba(36,36,52,0.92);
  --card-border: rgba(255,255,255,0.09);
  --hover: rgba(255,255,255,0.06);
  --active: rgba(255,255,255,0.1);
  --text: #f0f0f8;
  --text2: #909098;
  --textm: #44444e;
  --accent: #4d9fff;
  --accent-s: rgba(77,159,255,0.14);
  --sep: rgba(255,255,255,0.07);
  --shadow: 0 12px 56px rgba(0,0,0,0.65), 0 2px 12px rgba(0,0,0,0.35);
  --shadow-peek: 3px 0 16px rgba(0,0,0,0.4), 2px 0 6px rgba(0,0,0,0.25);
  --pin-bg: rgba(48,48,64,0.85);
  --spin: #4d9fff;
  --tidy: #636368;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background: transparent !important;
  font-family: -apple-system, 'Inter', sans-serif;
  color: var(--text);
  -webkit-app-region: no-drag;
}

#drag {
  -webkit-app-region: drag;
  position: fixed; top:0; left:calc(var(--peek) + 4px); right:0; height:44px;
  z-index: 9000; pointer-events: none;
}
#trig {
  position: fixed; top:0; left:0;
  width: 20px; height: 100%;
  z-index: 9999; cursor: default;
}

/* ── アップデートバー（サイドバー内） ── */
#update-bar {
  display: none;
  background: var(--accent); color: #fff; border-radius: 10px;
  padding: 8px 12px; margin: 0 8px 6px;
  align-items: center; gap: 8px; font-size: 12px; font-weight: 500;
  flex-shrink: 0; flex-wrap: wrap;
}
#update-install-btn {
  display: none; background: rgba(255,255,255,0.22); border: none; color: #fff;
  border-radius: 7px; padding: 4px 10px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
#update-install-btn:hover { background: rgba(255,255,255,0.35); }
#update-bar-close {
  background: transparent; border: none; color: rgba(255,255,255,0.7);
  cursor: pointer; font-size: 15px; line-height: 1; padding: 0; margin-left: auto;
}
.update-msg { flex: 1; line-height: 1.4; }
#update-progress-wrap {
  display: none; width: 100%; margin-top: 4px;
  align-items: center; gap: 6px;
}
#update-progress-track {
  flex: 1; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden;
}
#update-progress-bar {
  height: 100%; width: 0%; background: #fff; border-radius: 2px;
  transition: width 0.3s ease;
}
#update-progress-pct {
  font-size: 11px; color: rgba(255,255,255,0.85); min-width: 28px; text-align: right;
}

/* ── サイドバー本体 ── */
#sb {
  position: fixed; top: 10px;
  left: calc(-1 * var(--sb-w) + var(--peek));
  width: var(--sb-w);
  height: calc(100% - 20px);
  border-radius: 16px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  backdrop-filter: blur(40px) saturate(2);
  -webkit-backdrop-filter: blur(40px) saturate(2);
  box-shadow: var(--shadow-peek);
  z-index: 8000;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: left 0.3s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.3s ease;
  -webkit-app-region: no-drag;
}
#sb.open { left: 10px; box-shadow: var(--shadow); }

/* ── スペース ドット インジケーター ── */
#space-dots {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 0 6px; flex-shrink: 0;
}
.sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--card-border); transition: all .25s; cursor: pointer;
}
.sdot.on { width: 20px; border-radius: 3px; background: var(--accent); }

/* ── スワイプコンテナ ── */
#sb-track {
  flex: 1; display: flex; overflow: hidden; min-height: 0;
}
.space-pane {
  min-width: 100%; width: 100%;
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
  transition: transform 0.38s cubic-bezier(0.34, 1.1, 0.64, 1);
}

/* ── アカウントバッジ ── */
.acct-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px 6px; flex-shrink: 0;
}
.acct-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent-s); border: 1.5px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--accent);
  overflow: hidden; flex-shrink: 0;
}
.acct-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.acct-name { font-size: 12px; font-weight: 500; color: var(--text2); flex:1; }
.acct-add {
  width: 22px; height: 22px; border-radius: 7px;
  background: transparent; border: none; color: var(--textm);
  cursor: pointer; font-size: 17px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.acct-add:hover { background: var(--hover); color: var(--text); }

/* ── 上部バー ── */
.topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 46px 12px 6px; flex-shrink: 0;
}
.tb-url {
  flex: 1;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 11px; padding: 8px 12px;
  font-size: 13px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: text; user-select: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.ic-btn {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--card-border);
  color: var(--text2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.ic-btn:hover { background: var(--hover); color: var(--text); }
.ic-btn:active { transform: scale(.9); }

/* ── ナビ行 ── */
.navrow {
  display: flex; align-items: center; gap: 2px;
  padding: 0 10px 8px; flex-shrink: 0;
}
.nav-btn {
  width: 32px; height: 32px; border-radius: 9px;
  background: transparent; border: none;
  color: var(--text2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s;
}
.nav-btn:hover { background: var(--hover); color: var(--text); }
.nav-btn:active { transform: scale(.88); }
.nav-btn:disabled { opacity: .28; cursor: default; }
.nav-sp { flex: 1; }

/* ── URL 入力オーバーレイ ── */
#url-ov {
  display: none; position: fixed; inset: 0;
  z-index: 9990; background: rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center;
}
#url-ov.show { display: flex; }
.url-box {
  margin-top: 88px; background: var(--card);
  border: 1px solid var(--card-border); border-radius: 14px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  padding: 8px; width: 500px;
  display: flex; align-items: center; gap: 8px;
}
#url-inp {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 14.5px; font-family: inherit; color: var(--text); padding: 4px 8px;
}
#url-inp::placeholder { color: var(--textm); }
.url-go {
  background: var(--accent); color: #fff; border: none;
  border-radius: 9px; padding: 7px 16px;
  font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500;
}

/* ── スクロール ── */
.scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 0 8px 8px; scrollbar-width: none; min-height: 0;
}
.scroll::-webkit-scrollbar { display: none; }

/* ── ピンアプリ ── */
.pin-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 6px; padding: 4px 0 12px;
}
.pin-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; padding: 6px 2px; border-radius: 12px; transition: background .12s;
}
.pin-item:hover { background: var(--hover); }
.pin-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--pin-bg); border: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform .12s; overflow: hidden;
}
.pin-icon img { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; }
.pin-item:active .pin-icon { transform: scale(.9); }
.pin-lbl { font-size: 10.5px; color: var(--text2); text-align: center; white-space: nowrap; overflow: hidden; width: 100%; text-overflow: ellipsis; }

/* ── 区切り ── */
.sep { height: 1px; background: var(--sep); margin: 2px 4px 10px; flex-shrink: 0; }
.section-lbl { font-size: 12px; font-weight: 500; color: var(--text2); padding: 2px 8px 6px; }

/* ── ブックマーク ── */
.bm-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 8px; border-radius: 10px;
  cursor: pointer; transition: background .12s; margin-bottom: 1px;
}
.bm-item:hover { background: var(--hover); }
.bm-fav { width: 16px; height: 16px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
.bm-fav-ph { width: 16px; height: 16px; border-radius: 4px; background: var(--card-border); flex-shrink: 0; }
.bm-name { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── ブックマーク2（期限付き） ── */
.bm2-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.bm2-expiry { font-size: 10px; color: var(--textm); margin-top: 1px; }

/* ── コンテキストメニュー ── */
.ctx-menu {
  position: fixed; z-index: 99999;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 4px; min-width: 130px;
}
.ctx-item {
  display: block; width: 100%; text-align: left;
  background: transparent; border: none; border-radius: 7px;
  padding: 8px 12px; font-size: 13px; color: var(--text);
  cursor: pointer; font-family: inherit; transition: background .1s;
}
.ctx-item:hover { background: var(--hover); }

/* ── Tidy/Clear ── */
.tidy-row { display: flex; justify-content: flex-end; gap: 2px; padding: 4px 8px 8px; }
.tidy-btn {
  background: transparent; border: none;
  font-size: 12px; color: var(--tidy); cursor: pointer;
  padding: 4px 10px; border-radius: 7px;
  display: flex; align-items: center; gap: 4px; transition: background .12s;
}
.tidy-btn:hover { background: var(--hover); }

/* ── New Tab ── */
.new-tab-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 10px;
  cursor: pointer; color: var(--text2); font-size: 13px;
  transition: background .12s; margin-bottom: 2px;
}
.new-tab-row:hover { background: var(--hover); }

/* ── タブ一覧 ── */
.tab-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 8px; border-radius: 10px;
  cursor: pointer; transition: background .12s; margin-bottom: 1px;
}
.tab-item:hover { background: var(--hover); }
.tab-item.active { background: var(--active); }
.tab-fav { width: 16px; height: 16px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
.tab-fav-ph { width: 16px; height: 16px; border-radius: 4px; background: var(--card-border); flex-shrink: 0; }
.tab-spin { width: 14px; height: 14px; border: 1.5px solid transparent; border-top-color: var(--spin); border-radius: 50%; animation: sp .65s linear infinite; flex-shrink: 0; }
@keyframes sp { to { transform: rotate(360deg); } }
.tab-title { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab-x {
  opacity: 0; width: 18px; height: 18px; border-radius: 5px;
  background: transparent; border: none; color: var(--tidy);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; transition: all .12s;
}
.tab-item:hover .tab-x { opacity: 1; }
.tab-x:hover { background: rgba(255,59,48,.15); color: #ff3b30; }

/* ── フッター ── */
.sb-foot {
  padding: 8px 12px 10px; border-top: 1px solid var(--sep);
  display: flex; gap: 4px; flex-shrink: 0;
}
.ft-btn {
  flex: 1; background: transparent; border: none; border-radius: 9px;
  padding: 8px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.ft-btn:hover { background: var(--hover); color: var(--text); }

/* ── ブックマーク2 日時設定モーダル ── */
#bm2-date-modal {
  display: none; position: fixed; inset: 0; z-index: 9997;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#bm2-date-modal.show { display: flex; }
.bm2-modal-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 24px; width: 320px;
}
.bm2-modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.bm2-modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
#bm2-date-input {
  width: 100%; background: var(--hover); border: 1px solid var(--card-border);
  border-radius: 9px; padding: 9px 12px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; margin-bottom: 14px;
}
.bm2-modal-actions { display: flex; gap: 6px; justify-content: flex-end; }
.bm2-modal-btn {
  padding: 7px 16px; border-radius: 8px; border: none;
  font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer;
}
.bm2-modal-btn.cancel { background: var(--hover); color: var(--text2); }
.bm2-modal-btn.noexp { background: var(--hover); color: var(--text2); }
.bm2-modal-btn.confirm { background: var(--accent); color: #fff; }

/* ── スペース1ヘッダー ── */
.space1-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 14px 8px; flex-shrink: 0;
}
.space1-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.space1-add-btn {
  width: 26px; height: 26px; border-radius: 8px;
  background: var(--accent); border: none; color: #fff;
  cursor: pointer; font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .12s;
}
.space1-add-btn:hover { opacity: .85; }

/* ── インポートモーダル ── */
#import-modal {
  display:none; position:fixed; inset:0; z-index:9995;
  background:rgba(0,0,0,0.22); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#import-modal.show { display:flex; }
.import-box {
  background:var(--card); border:1px solid var(--card-border);
  border-radius:18px; box-shadow:0 24px 64px rgba(0,0,0,0.22);
  padding:28px; width:460px; max-height:80vh; overflow-y:auto;
}
.import-title { font-size:17px; font-weight:600; color:var(--text); margin-bottom:6px; }
.import-sub { font-size:13px; color:var(--text2); margin-bottom:20px; }
.import-browser-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.import-browser-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:12px;
  border:1px solid var(--card-border); cursor:pointer;
  transition:all .15s; background:transparent; width:100%; text-align:left;
}
.import-browser-item:hover { background:var(--hover); border-color:var(--accent); }
.import-browser-item.selected { background:var(--accent-s); border-color:var(--accent); }
.import-browser-icon { width:36px; height:36px; border-radius:10px; object-fit:contain; }
.import-browser-name { font-size:14px; font-weight:500; color:var(--text); }
.import-browser-path { font-size:11px; color:var(--textm); margin-top:1px; }
.import-actions { display:flex; gap:8px; justify-content:flex-end; }
.import-btn { padding:8px 18px; border-radius:9px; border:none; font-size:13px; font-family:inherit; font-weight:500; cursor:pointer; }
.import-btn.cancel { background:var(--hover); color:var(--text2); }
.import-btn.go { background:var(--accent); color:#fff; }
.import-btn:disabled { opacity:.4; cursor:default; }
.import-result { background:var(--hover); border-radius:10px; padding:12px 14px; font-size:13px; color:var(--text2); margin-bottom:16px; display:none; }
.import-result.show { display:block; }
.google-signin-btn {
  display:flex; align-items:center; gap:10px; width:100%;
  padding:11px 16px; border-radius:12px; border:1px solid var(--card-border);
  background:var(--card); cursor:pointer; font-size:14px; font-weight:500; color:var(--text);
  margin-bottom:16px; transition:all .15s;
}
.google-signin-btn:hover { background:var(--hover); }
.google-signin-btn img { width:20px; height:20px; }
.import-divider {
  display:flex; align-items:center; gap:12px;
  color:var(--textm); font-size:12px; margin-bottom:16px;
}
.import-divider::before, .import-divider::after { content:''; flex:1; height:1px; background:var(--sep); }

/* ── 通知設定モーダル ── */
#notif-modal {
  display: none; position: fixed; inset: 0; z-index: 9996;
  background: rgba(0,0,0,0.28); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
#notif-modal.show { display: flex; }
.notif-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 18px; box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  padding: 26px; width: 340px;
}
.notif-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.notif-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
.notif-master {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--hover); border-radius: 11px;
  margin-bottom: 14px;
}
.notif-master-lbl { font-size: 14px; font-weight: 500; color: var(--text); }
.notif-app-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.notif-app-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 11px; border: 1px solid var(--card-border);
  background: transparent;
}
.notif-app-icon { width: 28px; height: 28px; border-radius: 8px; object-fit: contain; }
.notif-app-lbl { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.notif-close-btn {
  width: 100%; padding: 10px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.notif-close-btn:hover { opacity: .88; }

/* ── トグルスイッチ ── */
.toggle {
  position: relative; width: 40px; height: 22px; flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--card-border); border-radius: 22px;
  transition: background .2s;
}
.toggle-slider:before {
  content: ''; position: absolute;
  width: 16px; height: 16px; left: 3px; bottom: 3px;
  background: #fff; border-radius: 50%; transition: transform .2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

/* ── ブックマーク1追加モーダル ── */
#bm1-add-modal {
  display: none; position: fixed; inset: 0; z-index: 9997;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#bm1-add-modal.show { display: flex; }
.bm1-modal-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 24px; width: 320px;
}
.bm1-modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
.bm1-modal-input {
  width: 100%; background: var(--hover); border: 1px solid var(--card-border);
  border-radius: 9px; padding: 9px 12px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; margin-bottom: 8px; display: block;
}
.bm1-modal-input:focus { border-color: var(--accent); }
.bm1-modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 14px; }
.bm1-modal-btn {
  padding: 7px 16px; border-radius: 8px; border: none;
  font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer;
}
.bm1-modal-btn.cancel { background: var(--hover); color: var(--text2); }
.bm1-modal-btn.confirm { background: var(--accent); color: #fff; }
/* ── ワークスペースバー ── */
#ws-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 8px 0 4px; flex-shrink: 0;
}
.ws-dot-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 11px; font-weight: 700;
  color: #fff; display: flex; align-items: center; justify-content: center;
  transition: all .18s; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}
.ws-dot-btn:hover { transform: scale(1.12); }
.ws-dot-btn.active { width: 30px; height: 30px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
.ws-dot-btn.ws-add { background: var(--card-border); color: var(--text2); font-size: 16px; font-weight: 400; }
.ws-dot-btn.ws-add:hover { background: var(--hover); }

/* ── ブックマーク編集モーダル ── */
#bm-edit-modal {
  display: none; position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#bm-edit-modal.show { display: flex; }
.bm-edit-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 24px; width: 320px;
}

/* ── ワークスペースモーダル ── */
#workspace-modal {
  display: none; position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#workspace-modal.show { display: flex; }
.ws-modal-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 24px; width: 340px;
}
.ws-modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.ws-modal-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.ws-modal-input {
  width: 100%; background: var(--hover); border: 1px solid var(--card-border);
  border-radius: 9px; padding: 9px 12px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; margin-bottom: 12px; display: block;
}
.ws-modal-input:focus { border-color: var(--accent); }
#ws-color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.ws-color-swatch {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform .12s;
}
.ws-color-swatch:hover { transform: scale(1.15); }
.ws-color-swatch.selected { border-color: var(--text); transform: scale(1.18); }


#history-modal, #download-modal {
  display: none; position: fixed; inset: 0; z-index: 9997;
  background: rgba(0,0,0,0.28); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
#history-modal.show, #download-modal.show { display: flex; }
.history-modal-box {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 18px; box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  padding: 22px; width: 560px; max-height: 70vh;
  display: flex; flex-direction: column;
}
.history-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-shrink: 0; }
.history-modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
.history-search-input { background: var(--hover); border: 1px solid var(--card-border); border-radius: 8px; padding: 4px 10px; font-size: 13px; color: var(--text); outline: none; width: 160px; }
.history-search-input:focus { border-color: var(--accent); }
.history-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.history-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; cursor: pointer; transition: background .12s; }
.history-item:hover { background: var(--hover); }
.history-item-icon { width: 16px; height: 16px; flex-shrink: 0; }
.history-item-info { flex: 1; min-width: 0; }
.history-item-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item-url { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item-time { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.history-item-del { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 14px; padding: 2px 5px; border-radius: 5px; flex-shrink: 0; opacity: 0; transition: opacity .12s; }
.history-item:hover .history-item-del { opacity: 1; }
.history-empty { color: var(--text2); font-size: 13px; text-align: center; padding: 32px 0; }
/* ── フォルダ / ドラッグ&ドロップ ── */
.folder-item {
  border-radius: 10px; margin-bottom: 1px; user-select: none;
}
.folder-head {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 10px;
  cursor: pointer; transition: background .12s;
}
.folder-head:hover { background: var(--hover); }
.folder-icon {
  width: 16px; height: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
}
.folder-icon svg { transition: transform .18s; }
.folder-item.open > .folder-head .folder-icon svg { transform: rotate(90deg); }
.folder-name {
  flex: 1; font-size: 13px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.folder-children {
  display: none; padding-left: 16px;
}
.folder-item.open > .folder-children { display: block; }
.drag-handle {
  width: 14px; height: 18px; flex-shrink: 0; cursor: grab;
  display: flex; align-items: center; justify-content: center;
  color: var(--textm); opacity: 0; transition: opacity .12s;
}
.folder-head:hover .drag-handle,
.tab-item:hover .drag-handle,
.bm-item:hover .drag-handle { opacity: 1; }
.drag-handle:active { cursor: grabbing; }
.drag-over-top { box-shadow: 0 -2px 0 var(--accent); }
.drag-over-bottom { box-shadow: 0 2px 0 var(--accent); }
.drag-over-folder { background: var(--accent-s) !important; }
.dragging { opacity: 0.4; }
/* タブフォルダ */
.tab-folder-item { border-radius: 10px; margin-bottom: 1px; }
.tab-folder-head {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 10px;
  cursor: pointer; transition: background .12s;
}
.tab-folder-head:hover { background: var(--hover); }
.tab-folder-item.open > .tab-folder-head .folder-icon svg { transform: rotate(90deg); }
.tab-folder-children { display: none; padding-left: 16px; }
.tab-folder-item.open > .tab-folder-children { display: block; }

</style>
</head>
